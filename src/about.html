<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>About</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #2b2b2b; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px; padding: 28px; display: flex; flex-direction: column; gap: 16px; overflow: hidden;
    }
    .logo { font-size: 28px; font-weight: 600; color: #4a9eff; letter-spacing: -0.5px; }
    .tagline { color: #888; font-size: 13px; }
    hr { border: none; border-top: 1px solid #3a3a3a; }
    .grid { display: grid; grid-template-columns: 100px 1fr; gap: 8px 12px; }
    .grid .key { color: #888; font-size: 12px; padding-top: 1px; }
    .grid .val { color: #e0e0e0; }
    .license-note {
      color: #666; font-size: 12px; line-height: 1.5;
      border-top: 1px solid #3a3a3a; padding-top: 14px; margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="logo">QBWebUIHelper</div>
  <div class="tagline">qBittorrent WebUI Desktop Wrapper</div>
  <hr>
  <div class="grid">
    <span class="key">Version</span>  <span class="val" id="app-version">…</span>
    <span class="key">Author</span>   <span class="val">Kritblade</span>
    <span class="key">License</span>  <span class="val">AGPL-3.0</span>
  </div>
  <script>
    window.__TAURI__.core.invoke('cmd_get_version').then(v => {
      document.getElementById('app-version').textContent = v;
    });
  </script>
  <p class="license-note">
    Registers as the default handler for .torrent files and magnet: links on Windows and macOS,
    forwarding them to your qBittorrent WebUI instance.
  </p>
</body>
</html>
